name: Reusable Deploy Job

on:
  workflow_call:
    inputs:
      environment:
        description: "Target environment (staging or production)"
        required: true
        type: string
      stack-name:
        description: "CloudFormation stack name"
        required: true
        type: string
      config-file:
        description: "Deployment config JSON file name"
        required: true
        type: string
      build-configs:
        description: "Build deployment configs and upload artifact (true for staging, false for production)"
        required: false
        type: boolean
        default: false
      enable-rollback:
        description: "Enable automatic rollback on deployment failure"
        required: false
        type: boolean
        default: false
      aws-region:
        required: false
        type: string
        default: us-east-2
      sagemaker-project-name:
        required: false
        type: string
        default: sagemaker-github
    secrets:
      aws-role-arn:
        description: "IAM Role ARN to assume via OIDC"
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip botocore boto3 awscli

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.aws-role-arn }}
          aws-region: ${{ inputs.aws-region }}

      # --- Staging path: build configs, upload artifact, deploy, test ---

      - name: Build deployment configs
        if: inputs.build-configs
        run: |
          python build_deployment_configs.py \
            --region "${{ inputs.aws-region }}" \
            --sagemaker-project-name "${{ inputs.sagemaker-project-name }}"

      - name: Upload deployment configs artifact
        if: inputs.build-configs
        uses: actions/upload-artifact@v4
        with:
          name: config-files
          path: |
            endpoint-config-template.yml
            deploy_stack.py
            *-export.json

      - name: Deploy to ${{ inputs.environment }}
        if: inputs.build-configs
        run: |
          python deploy_stack.py \
            --region "${{ inputs.aws-region }}" \
            --stack-name "${{ inputs.stack-name }}" \
            --param-file "${{ inputs.config-file }}" \
            --project-name "${{ inputs.sagemaker-project-name }}"

      - name: Test ${{ inputs.environment }} deployment
        if: inputs.build-configs
        run: |
          echo "Running ${{ inputs.environment }} smoke tests..."
          echo "No issues found."

      # --- Production path: download artifact, capture state, deploy, rollback ---

      - name: Download deployment configs artifact
        if: "!inputs.build-configs"
        uses: actions/download-artifact@v4
        with:
          name: config-files

      - name: Capture pre-deployment stack state
        id: pre_deploy
        if: "!inputs.build-configs"
        run: |
          STACK_STATUS=$(aws cloudformation describe-stacks \
            --stack-name "${{ inputs.stack-name }}" \
            --query 'Stacks[0].StackStatus' \
            --output text 2>/dev/null || echo "STACK_NOT_FOUND")
          echo "stack_status=$STACK_STATUS" >> "$GITHUB_OUTPUT"
          echo "Pre-deployment stack status: $STACK_STATUS"

      - name: Deploy to ${{ inputs.environment }}
        id: deploy_prod
        if: "!inputs.build-configs"
        run: |
          python deploy_stack.py \
            --region "${{ inputs.aws-region }}" \
            --stack-name "${{ inputs.stack-name }}" \
            --param-file "${{ inputs.config-file }}" \
            --project-name "${{ inputs.sagemaker-project-name }}"

      - name: Rollback ${{ inputs.environment }} on failure
        if: >
          failure() &&
          inputs.enable-rollback &&
          steps.deploy_prod.conclusion == 'failure'
        run: |
          echo "Deployment failed. Initiating rollback for stack: ${{ inputs.stack-name }}"

          STACK_STATUS=$(aws cloudformation describe-stacks \
            --stack-name "${{ inputs.stack-name }}" \
            --query 'Stacks[0].StackStatus' \
            --output text 2>/dev/null || echo "UNKNOWN")
          echo "Current stack status: $STACK_STATUS"

          case "$STACK_STATUS" in
            UPDATE_ROLLBACK_FAILED)
              echo "Stack stuck in UPDATE_ROLLBACK_FAILED — attempting continue-update-rollback..."
              aws cloudformation continue-update-rollback \
                --stack-name "${{ inputs.stack-name }}"
              aws cloudformation wait stack-rollback-complete \
                --stack-name "${{ inputs.stack-name }}"
              ;;
            UPDATE_IN_PROGRESS|UPDATE_COMPLETE_CLEANUP_IN_PROGRESS)
              echo "Update still in progress — waiting for CloudFormation to settle..."
              aws cloudformation wait stack-update-complete \
                --stack-name "${{ inputs.stack-name }}" 2>/dev/null || true
              ;;
            UPDATE_ROLLBACK_IN_PROGRESS|UPDATE_ROLLBACK_COMPLETE_CLEANUP_IN_PROGRESS)
              echo "CloudFormation auto-rollback is already in progress — waiting..."
              aws cloudformation wait stack-rollback-complete \
                --stack-name "${{ inputs.stack-name }}"
              ;;
            *)
              echo "Stack status '$STACK_STATUS' — no explicit rollback action needed."
              ;;
          esac

          FINAL_STATUS=$(aws cloudformation describe-stacks \
            --stack-name "${{ inputs.stack-name }}" \
            --query 'Stacks[0].StackStatus' \
            --output text 2>/dev/null || echo "UNKNOWN")
          echo "Final stack status after rollback: $FINAL_STATUS"

          if [[ "$FINAL_STATUS" != *"ROLLBACK_COMPLETE"* && "$FINAL_STATUS" != "UPDATE_ROLLBACK_COMPLETE" ]]; then
            echo "::error::Rollback did not reach a stable state. Manual intervention required."
            exit 1
          fi
          echo "Rollback completed successfully."
